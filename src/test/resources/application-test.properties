# Configuração de Teste - application-test.properties
# Perfil: test
# Propósito: Configurações específicas para testes unitários e de integração

# ============================================================
# Banco de Dados H2 em Memória
# ============================================================
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================================================
# H2 Console (útil para debugging)
# ============================================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================
# Logging
# ============================================================
logging.level.root=WARN
logging.level.com.api.meal4you=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ============================================================
# Server
# ============================================================
server.port=8080
server.servlet.context-path=/

# ============================================================
# Segurança e APIs (valores padrão para testes)
# ============================================================
senha.secreta.sincronizacao=test-secret-key
gemini.api.key=test-gemini-key
sendgrid.api.key=test-sendgrid-key
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret
url.servico.recomendacoes=http://localhost:8001

# ============================================================
# Outros
# ============================================================
spring.mail.host=localhost
spring.mail.port=1025
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui
